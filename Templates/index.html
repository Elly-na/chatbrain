<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CiscoBot — Network Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0f1117;
            --sidebar: #161b27;
            --surface: #1c2333;
            --surface2: #232d42;
            --border: #2a3650;
            --accent: #4f8ef7;
            --accent2: #38bdf8;
            --green: #10d9a0;
            --yellow: #fbbf24;
            --red: #f87171;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            transform: translateX(-260px);
            position: absolute;
            height: 100%;
            z-index: 100;
        }

        .sidebar-top {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .app-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .brand-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #1e40af, #4f8ef7);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 16px #4f8ef733;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
            font-family: var(--mono);
        }

        .brand-name span { color: var(--accent); }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            font-family: var(--sans);
        }

        .new-chat-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
            position: relative;
        }

        .chat-item:hover { background: var(--surface2); }
        .chat-item.active { background: var(--surface2); border: 1px solid var(--border); }

        .chat-item-icon {
            font-size: 14px;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .chat-item-info { flex: 1; min-width: 0; }

        .chat-item-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #cbd5e1;
        }

        .chat-item-time {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
        }

        .chat-item-actions {
            display: none;
            gap: 3px;
        }

        .chat-item:hover .chat-item-actions { display: flex; }

        .chat-action {
            padding: 3px 7px;
            border-radius: 4px;
            border: none;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-action.rename {
            background: var(--border);
            color: var(--text);
        }

        .chat-action.rename:hover { background: var(--accent); color: white; }

        .chat-action.del {
            background: #7f1d1d33;
            color: var(--red);
        }

        .chat-action.del:hover { background: var(--red); color: white; }

        .sidebar-bottom {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
        }

        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .user-avatar {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: white;
        }

        .logout-btn {
            padding: 5px 12px;
            background: #7f1d1d33;
            border: 1px solid #f8717133;
            border-radius: 6px;
            color: var(--red);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--sans);
        }

        .logout-btn:hover { background: var(--red); color: white; }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* ── TOPBAR ── */
        .topbar {
            padding: 12px 20px;
            background: var(--sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .topbar-left { display: flex; align-items: center; gap: 12px; }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex; align-items: center;
        }

        .toggle-btn:hover { background: var(--surface2); color: var(--text); }

        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .topbar-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px;
        }

        .topbar-right { display: flex; gap: 8px; align-items: center; }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .help-btn {
            padding: 7px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--sans);
        }

        .help-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── CHAT AREA ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── WELCOME ── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 40px 20px;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .welcome-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
            box-shadow: 0 0 40px #4f8ef733;
        }

        .welcome h2 {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 28px;
            max-width: 400px;
            line-height: 1.6;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .quick-btn {
            padding: 12px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #94a3b8;
            font-size: 12.5px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: var(--sans);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-btn:hover {
            background: var(--surface2);
            border-color: var(--accent);
            color: var(--text);
            transform: translateY(-1px);
        }

        .quick-btn span:first-child { font-size: 16px; }

        /* ── MESSAGES ── */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeUp 0.3s ease;
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
        }

        .message.user { justify-content: flex-end; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-avatar.bot {
            background: linear-gradient(135deg, #1e3a8a, #4f8ef7);
            box-shadow: 0 0 12px #4f8ef733;
        }

        .msg-avatar.user {
            background: var(--surface2);
            border: 1px solid var(--border);
        }

        .msg-body { flex: 1; min-width: 0; }

        .msg-label {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 5px;
            font-family: var(--mono);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13.5px;
            line-height: 1.7;
        }

        .message.user .msg-bubble {
            background: linear-gradient(135deg, #1e3a8a, #1d4ed8);
            border: 1px solid #2563eb44;
            color: #dbeafe;
            border-radius: 12px 12px 3px 12px;
            display: inline-block;
            max-width: 70%;
            float: right;
        }

        .message.bot .msg-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #cbd5e1;
            border-radius: 12px 12px 12px 3px;
        }

        /* ── CODE BLOCK ── */
        .code-wrap {
            margin: 10px 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 14px;
            background: #0d1525;
            border-bottom: 1px solid var(--border);
        }

        .code-lang {
            font-size: 10px;
            font-family: var(--mono);
            color: var(--green);
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .code-lang::before {
            content: '';
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .code-copy {
            padding: 3px 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            font-size: 10px;
            font-family: var(--mono);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .code-copy:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .code-copy.copied { background: var(--green); color: white; border-color: var(--green); }

        pre.code-content {
            padding: 14px 16px;
            background: #080d18;
            font-family: var(--mono);
            font-size: 12.5px;
            color: #7dd3fc;
            white-space: pre-wrap;
            overflow-x: auto;
            line-height: 1.7;
            margin: 0;
        }

        /* ── NUMBERED LIST ── */
        .num-item {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin: 5px 0;
        }

        .num-badge {
            width: 20px; height: 20px;
            background: #1e3a8a;
            border: 1px solid #3b82f644;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent2);
            flex-shrink: 0;
            margin-top: 3px;
            font-family: var(--mono);
        }

        /* ── TYPING ── */
        .typing-indicator {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 4px 0;
        }

        .typing-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* ── INPUT AREA ── */
        .input-area {
            padding: 14px 20px 18px;
            border-top: 1px solid var(--border);
            background: var(--sidebar);
            flex-shrink: 0;
        }

        .input-wrap {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 13.5px;
            font-family: var(--sans);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
            max-height: 120px;
        }

        .input-box:focus { border-color: var(--accent); }
        .input-box::placeholder { color: var(--muted); }

        .send-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #1e40af, var(--accent));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 16px #4f8ef744;
        }

        .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        .input-hint {
            text-align: center;
            font-size: 10px;
            color: #1e3a5f;
            margin-top: 6px;
            font-family: var(--mono);
            letter-spacing: 0.3px;
        }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.show { display: flex; }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 380px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: var(--sans);
            margin-bottom: 16px;
        }

        .modal-input:focus { border-color: var(--accent); }

        .modal-btns {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 18px;
            border-radius: 7px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--sans);
        }

        .modal-btn.cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
        .modal-btn.cancel:hover { color: var(--text); }
        .modal-btn.confirm { background: var(--accent); color: white; }
        .modal-btn.confirm:hover { filter: brightness(1.1); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100%;
                z-index: 100;
                transform: translateX(-260px);
            }

            .sidebar.open {
                transform: translateX(0);
                box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            }

            .quick-grid { grid-template-columns: 1fr; }
            .chat-area { padding: 16px 12px; }
            .input-area { padding: 10px 12px 14px; }
        }

        @media (min-width: 769px) {
            .sidebar.collapsed { transform: translateX(0); position: relative; }
            .sidebar.collapsed.hide { transform: translateX(-260px); position: absolute; }
        }

        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }

        .overlay.show { display: block; }
    </style>
</head>
<body>

<!-- Overlay for mobile -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="app-brand">
            <div class="brand-icon">🌐</div>
            <div class="brand-name">Cisco<span>Bot</span></div>
        </div>
        <button class="new-chat-btn" onclick="createNewChat()">
            ➕ New Chat
        </button>
    </div>

    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-bottom">
        <div class="user-row">
            <div class="user-name">
                <div class="user-avatar" id="userAvatar">F</div>
                <span id="userNameDisplay">{{ username }}</span>
            </div>
            <button class="logout-btn" onclick="confirmLogout()">Logout</button>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <button class="toggle-btn" onclick="toggleSidebar()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <div>
                <div class="topbar-title">Cisco IOS Chatbot</div>
                <div class="topbar-sub">AI Network Assistant</div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="status-dot"></div>
            <button class="help-btn" onclick="sendQuick('help')">📚 Help</button>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea"></div>

    <!-- INPUT -->
    <div class="input-area">
        <div class="input-wrap">
            <textarea
                class="input-box"
                id="inputBox"
                rows="1"
                placeholder="Ask anything about Cisco IOS... (typos are OK!)"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">ENTER TO SEND · SHIFT+ENTER FOR NEW LINE</div>
    </div>
</div>

<!-- RENAME MODAL -->
<div class="modal" id="renameModal">
    <div class="modal-box">
        <div class="modal-title">✏️ Rename Chat</div>
        <input class="modal-input" id="renameInput" placeholder="Enter chat name..." />
        <div class="modal-btns">
            <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-btn confirm" onclick="confirmRename()">Rename</button>
        </div>
    </div>
</div>

<script>
    let chats = [];
    let currentChatId = null;
    let currentMessages = [];
    let renameTargetId = null;
    let isLoading = false;

    // ── INIT ──
    async function init() {
        const username = document.getElementById('userNameDisplay').textContent.trim();
        if (username) {
            document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
        }
        await loadChats();
        if (chats.length === 0) {
            await createNewChat();
        } else {
            await switchChat(chats[0].id);
        }
    }

    // ── LOAD CHATS ──
    async function loadChats() {
        try {
            const res = await fetch('/api/chats');
            chats = await res.json();
            renderChatList();
        } catch(e) { console.error(e); }
    }

    // ── CREATE CHAT ──
    async function createNewChat() {
        try {
            const res = await fetch('/api/chats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'New Chat' })
            });
            const chat = await res.json();
            await loadChats();
            await switchChat(chat.id);
        } catch(e) { console.error(e); }
    }

    // ── SWITCH CHAT ──
    async function switchChat(chatId) {
        currentChatId = chatId;
        try {
            const res = await fetch(`/api/chats/${chatId}`);
            currentMessages = await res.json();
            renderChatList();
            renderMessages();
        } catch(e) { console.error(e); }

        // close sidebar on mobile
        if (window.innerWidth < 769) closeSidebar();
    }

    // ── RENDER CHAT LIST ──
    function renderChatList() {
        const el = document.getElementById('chatList');
        if (chats.length === 0) {
            el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">No chats yet</div>';
            return;
        }
        el.innerHTML = chats.map(c => `
            <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" onclick="switchChat(${c.id})">
                <div class="chat-item-icon">💬</div>
                <div class="chat-item-info">
                    <div class="chat-item-title">${escHtml(c.name)}</div>
                    <div class="chat-item-time">${timeAgo(c.updated_at)}</div>
                </div>
                <div class="chat-item-actions">
                    <button class="chat-action rename" onclick="openRename(event,${c.id})">✏️</button>
                    <button class="chat-action del" onclick="deleteChat(event,${c.id})">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    // ── RENDER MESSAGES ──
    function renderMessages() {
        const area = document.getElementById('chatArea');
        if (currentMessages.length === 0) {
            area.innerHTML = `
                <div class="welcome">
                    <div class="welcome-icon">🌐</div>
                    <h2>Hello, ${escHtml(document.getElementById('userNameDisplay').textContent)}! 👋</h2>
                    <p>Ask me anything about Cisco IOS — commands, configurations, troubleshooting. I understand typos too!</p>
                    <div class="quick-grid">
                        <button class="quick-btn" onclick="sendQuick('configure R1')"><span>🖥️</span> Configure R1</button>
                        <button class="quick-btn" onclick="sendQuick('setup RIP routing')"><span>🔄</span> Setup RIP</button>
                        <button class="quick-btn" onclick="sendQuick('show ip interface brief')"><span>📋</span> Show Interfaces</button>
                        <button class="quick-btn" onclick="sendQuick('configure static route')"><span>📍</span> Static Route</button>
                        <button class="quick-btn" onclick="sendQuick('set enable password')"><span>🔒</span> Set Password</button>
                        <button class="quick-btn" onclick="sendQuick('troubleshoot ping not working')"><span>🔧</span> Troubleshoot</button>
                    </div>
                </div>`;
            return;
        }

        area.innerHTML = currentMessages.map((msg, i) => {
            const isUser = msg.type === 'user';
            return `
                <div class="message ${isUser ? 'user' : 'bot'}">
                    ${!isUser ? `<div class="msg-avatar bot">🤖</div>` : ''}
                    <div class="msg-body">
                        <div class="msg-label">${isUser ? 'YOU' : 'CISCOBOT'}</div>
                        <div class="msg-bubble">
                            ${isUser ? escHtml(msg.text) : formatReply(msg.text)}
                        </div>
                    </div>
                    ${isUser ? `<div class="msg-avatar user">👤</div>` : ''}
                </div>`;
        }).join('');

        area.scrollTop = area.scrollHeight;
    }

    // ── FORMAT BOT REPLY ──
    function formatReply(text) {
        if (!text) return '';

        // Code blocks
        text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => `
            <div class="code-wrap">
                <div class="code-header">
                    <span class="code-lang">Cisco IOS</span>
                    <button class="code-copy" onclick="copyCode(this)">COPY</button>
                </div>
                <pre class="code-content">${escHtml(code.trim())}</pre>
            </div>`);

        // Inline code
        text = text.replace(/`([^`]+)`/g, `<code style="background:#0f172a;padding:2px 7px;border-radius:4px;font-family:var(--mono);color:#7dd3fc;font-size:12px">$1</code>`);

        // Bold
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#f1f5f9">$1</strong>');

        // Numbered list
        text = text.replace(/^(\d+)\.\s(.+)$/gm, `
            <div class="num-item">
                <div class="num-badge">$1</div>
                <div>$2</div>
            </div>`);

        // Line breaks
        text = text.replace(/\n{2,}/g, '<br><br>');
        text = text.replace(/\n/g, '<br>');

        return text;
    }

    // ── SEND MESSAGE ──
    async function sendMessage() {
        const input = document.getElementById('inputBox');
        const msg = input.value.trim();
        if (!msg || isLoading || !currentChatId) return;

        isLoading = true;
        document.getElementById('sendBtn').disabled = true;

        currentMessages.push({ type: 'user', text: msg });
        input.value = '';
        input.style.height = 'auto';
        renderMessages();
        showTyping();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, chat_id: currentChatId })
            });
            const data = await res.json();
            currentMessages.push({ type: 'bot', text: data.text || data.error });
            renderMessages();
            await loadChats();
        } catch(e) {
            currentMessages.push({ type: 'bot', text: '❌ Connection error. Please try again.' });
            renderMessages();
        }

        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('inputBox').focus();
    }

    function showTyping() {
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'typing';
        div.innerHTML = `
            <div class="msg-avatar bot">🤖</div>
            <div class="msg-body">
                <div class="msg-label">CISCOBOT</div>
                <div class="msg-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    function sendQuick(text) {
        document.getElementById('inputBox').value = text;
        sendMessage();
    }

    // ── COPY CODE ──
    function copyCode(btn) {
        const code = btn.closest('.code-wrap').querySelector('.code-content').innerText;
        navigator.clipboard.writeText(code);
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
    }

    // ── DELETE CHAT ──
    async function deleteChat(e, id) {
        e.stopPropagation();
        if (!confirm('Delete this chat?')) return;
        await fetch(`/api/chats/${id}`, { method: 'DELETE' });
        await loadChats();
        if (currentChatId === id) {
            if (chats.length > 0) await switchChat(chats[0].id);
            else await createNewChat();
        }
    }

    // ── RENAME ──
    function openRename(e, id) {
        e.stopPropagation();
        renameTargetId = id;
        const chat = chats.find(c => c.id === id);
        document.getElementById('renameInput').value = chat.name;
        document.getElementById('renameModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('renameModal').classList.remove('show');
        renameTargetId = null;
    }

    async function confirmRename() {
        const name = document.getElementById('renameInput').value.trim();
        if (!name || !renameTargetId) return;
        await fetch(`/api/chats/${renameTargetId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });
        await loadChats();
        closeModal();
    }

    // ── SIDEBAR ──
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        if (window.innerWidth < 769) {
            sb.classList.toggle('open');
            ov.classList.toggle('show');
        } else {
            sb.classList.toggle('hide');
        }
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }

    // ── HELPERS ──
    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function confirmLogout() {
        if (confirm('Logout?')) window.location.href = '/logout';
    }

    function escHtml(t) {
        const d = document.createElement('div');
        d.textContent = t || '';
        return d.innerHTML;
    }

    function timeAgo(dateStr) {
        const s = Math.floor((new Date() - new Date(dateStr)) / 1000);
        if (s < 60) return 'Just now';
        if (s < 3600) return Math.floor(s/60) + 'm ago';
        if (s < 86400) return Math.floor(s/3600) + 'h ago';
        return Math.floor(s/86400) + 'd ago';
    }

    init();
</script>
</body>
</html>
